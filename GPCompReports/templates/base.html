<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GPCompReports{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_prefix }}static/css/main.css">
    <script src="https://cdn.plot.ly/plotly-3.3.1.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ static_prefix }}index.html" class="navbar-brand">
            <img src="{{ static_prefix }}static/img/lablogo.png" alt="TGGR Lab">
            <span>GPCompReports</span>
        </a>
        <ul class="navbar-links">
            <li><a href="{{ static_prefix }}index.html" {% if active_page == 'home' %}class="active"{% endif %}>Home</a></li>
            <li><a href="{{ static_prefix }}browse/index.html" {% if active_page == 'browse' %}class="active"{% endif %}>Browse GPCRs</a></li>
            <li><a href="{{ static_prefix }}statistics.html" {% if active_page == 'statistics' %}class="active"{% endif %}>Statistics</a></li>
        </ul>
    </nav>

    {% block breadcrumbs %}{% endblock %}

    {% block content %}{% endblock %}

    <footer class="footer">
        GPCompReports &mdash; TGGR Lab | {{ total_gpcrs }} Class A GPCRs Analyzed
    </footer>

    <script src="{{ static_prefix }}static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
